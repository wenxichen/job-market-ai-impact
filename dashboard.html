<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — AI Job Market Predictions</title>
    <meta name="description" content="Visual overview of the AI job market predictions archive." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero hero-compact">
      <div class="container">
        <nav style="display:flex;gap:16px;margin-bottom:16px;">
          <a href="index.html" style="color:var(--muted);font-weight:600;text-decoration:none;">Archive</a>
          <a href="timeline.html" style="color:var(--muted);font-weight:600;text-decoration:none;">Timeline</a>
          <a href="dashboard.html" style="color:var(--accent);font-weight:600;text-decoration:none;">Dashboard</a>
        </nav>
        <p class="eyebrow">Visual overview</p>
        <h1>Dashboard</h1>
        <p class="lede">What the data says — at a glance.</p>
      </div>
    </header>

    <main class="container" style="padding: 32px 0 64px;">
      <!-- Top stat pills -->
      <div class="stats" id="topStats" style="margin-bottom: 32px;"></div>

      <div class="dashboard-grid">
        <div class="card" style="padding:24px;">
          <h2 style="margin:0 0 16px; font-size:1.1rem;">Topic Distribution</h2>
          <div id="tagChart" class="bar-chart"></div>
        </div>
        <div class="card" style="padding:24px;">
          <h2 style="margin:0 0 16px; font-size:1.1rem;">Speaker Types</h2>
          <div class="type-chart">
            <div id="speakerChart" class="donut-chart" aria-hidden="true"></div>
            <div id="speakerLegend" class="type-list"></div>
          </div>
        </div>
      </div>

      <div class="card" style="padding:24px; margin-bottom:28px;">
        <h2 style="margin:0 0 16px; font-size:1.1rem;">Predictions Over Time</h2>
        <div id="timelineChart" class="timeline-bars"></div>
      </div>

      <h2 style="margin:0 0 20px; font-size:1.3rem;">Speakers</h2>
      <div id="speakerCards" class="card-grid speaker-grid"></div>
    </main>

    <script defer>
    (async function () {
      const SPEAKER_AVATARS = {
        "Kristalina Georgieva": "https://upload.wikimedia.org/wikipedia/commons/e/eb/Kristalina_Georgieva_Headshot.jpg",
        "Gita Gopinath": "https://upload.wikimedia.org/wikipedia/commons/d/d2/Gita_Gopinath_2025_%28cropped%29.jpg",
        "António Guterres": "https://upload.wikimedia.org/wikipedia/commons/1/15/U.N._Secretary_General_Antonio_Guterres_%283x4_cropped_b%29.jpg",
        "Arvind Krishna": "https://upload.wikimedia.org/wikipedia/commons/3/30/Arvind_Krishna_in_2025_%28cropped%29.jpg",
        "Bill Gates": "https://upload.wikimedia.org/wikipedia/commons/d/d9/Bill_Gates_at_the_European_Commission_-_P067383-987995_%28cropped%29_5.jpg",
        "Dario Amodei": "https://upload.wikimedia.org/wikipedia/commons/e/e4/Dario_Amodei_at_TechCrunch_Disrupt_2023_01_%28cropped%29.jpg",
        "Elon Musk": "https://upload.wikimedia.org/wikipedia/commons/5/5e/Elon_Musk_-_54820081119_%28cropped%29.jpg",
        "Saadia Zahidi": "https://upload.wikimedia.org/wikipedia/commons/1/1a/Saadia_Zahidi_cropped.jpg",
        "Sam Altman": "https://upload.wikimedia.org/wikipedia/commons/f/f8/Sam_Altman_TechCrunch_SF_2019_Day_2_Oct_3_%28cropped_3%29.jpg",
        "Satya Nadella": "https://upload.wikimedia.org/wikipedia/commons/4/4f/MS-Exec-Nadella-Satya-2017-08-31-22_%28cropped%29.jpg",
        "Ursula von der Leyen": "https://upload.wikimedia.org/wikipedia/commons/f/f2/Ursula_von_der_Leyen_2024.jpg",
        "Jensen Huang": "https://upload.wikimedia.org/wikipedia/commons/0/05/JensenHuangSC18.jpg",
        "Anthropic research team": "https://upload.wikimedia.org/wikipedia/commons/7/78/Anthropic_logo.svg",
        "Anthropic": "https://upload.wikimedia.org/wikipedia/commons/7/78/Anthropic_logo.svg",
        "International Labour Organization": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/UN_Labour_Organization_logo.png/240px-UN_Labour_Organization_logo.png",
        "World Economic Forum": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/World_Economic_Forum_logo.svg/240px-World_Economic_Forum_logo.svg.png",
      };

      const res = await fetch("predictions.json");
      const predictions = await res.json();

      const tagCount = {};
      const typeCount = {};
      const dateMap = {};
      const speakers = {};

      predictions.forEach((prediction) => {
        (prediction.topic_tags || []).forEach((tag) => {
          tagCount[tag] = (tagCount[tag] || 0) + 1;
        });

        const speakerType = prediction.speaker_type || "unknown";
        typeCount[speakerType] = (typeCount[speakerType] || 0) + 1;

        const year = (prediction.date_made || "????").slice(0, 4);
        if (year !== "????") {
          dateMap[year] = (dateMap[year] || 0) + 1;
        }

        const key = (prediction.speaker_name || "").toLowerCase().replace(/\s+/g, "-");
        if (!speakers[key]) {
          speakers[key] = {
            name: prediction.speaker_name,
            org: prediction.organization || "",
            type: speakerType,
            earliest: prediction.date_made,
          };
        }
      });

      const topTags = Object.entries(tagCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const total = predictions.length;
      const years = Object.keys(dateMap).sort();

      renderStats([
        [`${total} predictions`, "stat-blue"],
        [`${Object.keys(speakers).length} speakers`, "stat-green"],
        [`${Object.keys(tagCount).length} topics`, "stat-gold"],
        [`${years.length} years`, "stat-violet"],
      ]);
      renderBars(document.getElementById("tagChart"), topTags);
      renderDonut(typeCount);
      renderTimeline(years.map((year) => [year, dateMap[year]]));
      renderSpeakers(Object.values(speakers));

      function renderStats(items) {
        const container = document.getElementById("topStats");
        items.forEach(([label, className]) => {
          const pill = document.createElement("span");
          pill.className = `badge ${className}`;
          pill.textContent = label;
          container.appendChild(pill);
        });
      }

      function renderBars(container, items) {
        const max = Math.max(...items.map(([, count]) => count), 1);
        items.forEach(([label, count]) => {
          const row = document.createElement("div");
          row.className = "bar-row";

          const name = document.createElement("span");
          name.className = "bar-label";
          name.textContent = humanize(label);

          const track = document.createElement("span");
          track.className = "bar-track";

          const bar = document.createElement("span");
          bar.className = "bar-fill";
          bar.style.width = `${Math.max((count / max) * 100, 7)}%`;
          track.appendChild(bar);

          const value = document.createElement("span");
          value.className = "bar-value";
          value.textContent = count;

          row.append(name, track, value);
          container.appendChild(row);
        });
      }

      function renderDonut(counts) {
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const totalCount = entries.reduce((sum, [, count]) => sum + count, 0);
        const palette = ["#2151ff", "#db3a34", "#1a7a4a", "#b25a00", "#6a4bc3", "#087e8b", "#425466"];
        let offset = 0;
        const gradientParts = entries.map(([, count], index) => {
          const start = offset;
          offset += (count / totalCount) * 100;
          return `${palette[index % palette.length]} ${start}% ${offset}%`;
        });

        document.getElementById("speakerChart").style.background =
          `conic-gradient(${gradientParts.join(", ")})`;

        const legend = document.getElementById("speakerLegend");
        entries.forEach(([label, count], index) => {
          const item = document.createElement("div");
          item.className = "type-item";

          const swatch = document.createElement("span");
          swatch.className = "type-swatch";
          swatch.style.background = palette[index % palette.length];

          const text = document.createElement("span");
          text.textContent = `${humanize(label)} (${count})`;

          item.append(swatch, text);
          legend.appendChild(item);
        });
      }

      function renderTimeline(items) {
        const container = document.getElementById("timelineChart");
        const max = Math.max(...items.map(([, count]) => count), 1);

        items.forEach(([year, count]) => {
          const item = document.createElement("div");
          item.className = "timeline-bar-item";

          const bar = document.createElement("span");
          bar.className = "timeline-bar";
          bar.style.height = `${Math.max((count / max) * 150, 16)}px`;
          bar.title = `${year}: ${count}`;

          const label = document.createElement("span");
          label.className = "timeline-bar-label";
          label.textContent = year;

          item.append(bar, label);
          container.appendChild(item);
        });
      }

      function renderSpeakers(speakerList) {
        const container = document.getElementById("speakerCards");
        speakerList
          .sort((a, b) => String(a.name).localeCompare(String(b.name)))
          .forEach((speaker) => {
            const card = document.createElement("article");
            card.className = "card speaker-card";

            const header = document.createElement("div");
            header.className = "speaker-card-header";

            const copy = document.createElement("div");
            copy.className = "speaker-card-copy";

            const name = document.createElement("div");
            name.className = "speaker-name";
            name.textContent = speaker.name || "Unknown speaker";

            const org = document.createElement("div");
            org.className = "speaker-org";
            org.textContent = speaker.org || "Not specified";

            copy.append(name, org);
            header.append(createSpeakerAvatar(speaker.name), copy);

            const pills = document.createElement("div");
            pills.className = "speaker-pills";

            const type = document.createElement("span");
            type.className = "badge badge-speaker";
            type.textContent = labelSpeakerType(speaker.type);
            pills.appendChild(type);

            if (speaker.earliest) {
              const year = document.createElement("span");
              year.className = "badge stat-gold";
              year.textContent = speaker.earliest.slice(0, 4);
              pills.appendChild(year);
            }

            card.append(header, pills);
            container.appendChild(card);
          });
      }

      function createSpeakerAvatar(name) {
        const avatarUrl = SPEAKER_AVATARS[name];
        if (!avatarUrl) return createInitialsAvatar(name);

        const frame = document.createElement("div");
        frame.className = "speaker-avatar-frame";
        frame.appendChild(createInitialsAvatar(name));

        const image = document.createElement("img");
        image.className = "speaker-photo";
        image.src = avatarUrl;
        image.alt = name || "Speaker";
        image.onload = () => {
          frame.classList.add("loaded");
        };
        image.onerror = () => {
          image.remove();
        };
        frame.appendChild(image);
        return frame;
      }

      function createInitialsAvatar(name) {
        const initials = document.createElement("div");
        initials.className = "speaker-initials";
        initials.textContent = getInitials(name);
        return initials;
      }

      function getInitials(name) {
        return String(name || "?")
          .split(/\s+/)
          .filter(Boolean)
          .map((word) => word[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
      }

      function labelSpeakerType(type) {
        return {
          ceo: "CEO",
          institution: "Institution",
          economist: "Economist",
          politician: "Politician",
          researcher: "Researcher",
          "institution-leader": "Institution Leader",
          technologist: "Technologist",
        }[type] || humanize(type || "unknown");
      }

      function humanize(value) {
        return String(value)
          .replace(/[-_]/g, " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());
      }
    })();
    </script>
  </body>
</html>
